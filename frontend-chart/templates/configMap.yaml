apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "frontend-chart.fullname" . }}-nginx-config
data:
  default.conf: | 
    server {
      listen 80;
      server_name localhost;
      
      location / {
          root /usr/share/nginx/html;
          index index.html;
          try_files $uri $uri/ /index.html;
      }
      
      # Cấu hình Proxy để gọi Backend API
      location /api/v1/ {
          resolver 169.254.169.254 8.8.8.8 valid=30s;
          proxy_pass http://api.shoeshopecommerce.dpdns.org/api/v1/;
          proxy_http_version 1.1;
          proxy_set_header Host api.shoeshopecommerce.dpdns.org;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /nginx_status {
          stub_status on;
          access_log off;
          allow 127.0.0.1;  
          deny all;
      }
    }