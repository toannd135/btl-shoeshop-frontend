apiVersion: v1
kind: ConfigMap
metadata: 
  name: {{ include "frontend-chart.fullname" . }}-configmap
data:
  default.conf: |
    server {
      listen 80;
      server_name shoeshopecommerce.dpdns.org api.shoeshopecommerce.dpdns.org;

      # Tăng timeout để chờ Backend xử lý Refresh Token (tránh lỗi 504)
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;

      location / {
          root   /usr/share/nginx/html;
          index  index.html index.htm;
          try_files $uri $uri/ /index.html;
      }

      location /api/ { 
          proxy_pass http://34.124.205.221/; 
          
          # Truyền đầy đủ Header để Backend nhận diện Token
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;

          # Hỗ trợ Cookies/Authorization cho Refresh Token
          proxy_set_header Authorization $http_authorization;
          proxy_pass_header Authorization;

          # Xử lý CORS cực kỳ quan trọng cho Refresh Token
          if ($request_method = 'OPTIONS') {
              add_header 'Access-Control-Allow-Origin' '$http_origin' always;
              add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
              add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Refresh-Token' always;
              add_header 'Access-Control-Allow-Credentials' 'true' always;
              add_header 'Access-Control-Max-Age' 1728000;
              add_header 'Content-Type' 'text/plain; charset=utf-8';
              add_header 'Content-Length' 0;
              return 204;
          }

          add_header 'Access-Control-Allow-Origin' '$http_origin' always;
          add_header 'Access-Control-Allow-Credentials' 'true' always;
          add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
          add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Refresh-Token' always;
          
          # Loại bỏ lỗi "buffer too small" nếu Token quá dài
          proxy_buffer_size          128k;
          proxy_buffers              4 256k;
          proxy_busy_buffers_size    256k;
      }
    }