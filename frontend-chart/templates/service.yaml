apiVersion: v1
kind: Service
metadata:
  name: {{ include "frontend-chart.fullname" . }}
  labels:
    {{- include "frontend-chart.selectorLabels" . | nindent 4 }}
spec:
  selector:
    {{- include "frontend-chart.selectorLabels" . | nindent 4 }}
  type: {{ .Values.service.type }}
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
  # - name: https
  #   port: 443
  #   targetPort: 443
  #   protocol: TCP
  